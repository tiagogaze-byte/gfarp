<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Detalhe — Gestão de Demandas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>body{font-family:'Inter',sans-serif;}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;}</style>
</head>
<body class="bg-slate-50 text-slate-800">
<aside id="sidebar" class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col py-6 px-4 z-50 border-r border-slate-100"></aside>
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-white/90 backdrop-blur-md z-40 border-b border-slate-100 flex items-center justify-between px-8">
  <nav class="flex items-center gap-2 text-sm text-slate-400">
    <a href="/projetos.html" class="hover:text-[#00193c]">Projetos</a>
    <span class="material-symbols-outlined text-xs">chevron_right</span>
    <span class="font-semibold text-[#00193c]" id="hdr-codigo">...</span>
  </nav>
  <button id="btn-tramitar" onclick="tramitar()" class="hidden px-5 py-2 bg-[#00193c] text-white font-bold rounded-xl text-sm hover:opacity-90 flex items-center gap-2">
    <span class="material-symbols-outlined text-sm">swap_horiz</span>Tramitar
  </button>
</header>

<main class="ml-64 pt-24 pb-12 px-8 min-h-screen" id="main-content">
  <div class="flex justify-center py-32 text-slate-400">Carregando...</div>
</main>

<script src="/public/js/api.js"></script>
<script>
const pid = new URLSearchParams(window.location.search).get('id');
let usuario, projeto, historico = [];

async function init() {
  usuario = await protegerRota();
  if (!usuario) return;
  montarSidebar(usuario, 'proj');
  if (!pid) { renderErro('ID não informado.'); return; }
  await carregar();
}

async function carregar() {
  try {
    [projeto, historico] = await Promise.all([
      API.buscarProjeto(pid),
      API.listarHistorico(pid)
    ]);
    if (!projeto) { renderErro('Projeto não encontrado.'); return; }
    render();
  } catch(e) { renderErro(e.message); }
}

function renderErro(msg) {
  document.getElementById('main-content').innerHTML = `<div class="text-center py-32"><p class="text-red-500 font-bold">${msg}</p><a href="/projetos.html" class="mt-4 inline-block text-[#00193c] text-sm font-bold hover:underline">← Voltar</a></div>`;
}

function podeEditar() {
  return usuario.is_master || projeto.gestor_id === usuario.id || projeto.analista_id === usuario.id;
}

function render() {
  document.getElementById('hdr-codigo').textContent = projeto.codigo;
  const cor = API.semaforoCor(projeto.semaforo);
  const semLabel = API.semaforoLabel(projeto.semaforo);
  const statusLabel = API.statusLabel(projeto.status);

  if (projeto.status !== 'FINALIZADO') {
    document.getElementById('btn-tramitar').classList.remove('hidden');
    document.getElementById('btn-tramitar').classList.add('flex');
  }

  const fluxo = {EM_ANALISE:'GFCAP',GFCAP:'OSC',OSC:'FINALIZADO'};
  const proximo = fluxo[projeto.status];

  const editFields = podeEditar() ? `
    <section class="bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
      <h2 class="font-bold text-[#00193c] mb-4 flex items-center gap-2"><span class="material-symbols-outlined">edit</span>Atualizar</h2>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Data de Distribuição</label>
          <input id="ed-distrib" type="date" value="${projeto.data_distribuicao?.split('T')[0]||''}" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Data Saída Diretoria</label>
          <input id="ed-saida" type="date" value="${projeto.data_saida_diretoria?.split('T')[0]||''}" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Data de Pausa</label>
          <input id="ed-pausa" type="date" value="${projeto.data_pausa?.split('T')[0]||''}" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Motivo da Pausa</label>
          <input id="ed-motivo" type="text" value="${projeto.motivo_pausa||''}" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
        <div class="col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Principais Apontamentos</label>
          <textarea id="ed-aponts" rows="3" class="w-full bg-slate-50 rounded-xl border-none px-3 py-2 text-sm">${projeto.principais_apontamentos||''}</textarea></div>
        <div class="col-span-2"><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Observações da Gerência</label>
          <textarea id="ed-obs" rows="2" class="w-full bg-slate-50 rounded-xl border-none px-3 py-2 text-sm">${projeto.observacoes_gerencia||''}</textarea></div>
      </div>
      <div class="flex justify-end mt-4 items-center gap-3">
        <span id="msg-salvo" class="text-emerald-600 text-sm font-bold hidden">✅ Salvo!</span>
        <button onclick="salvar()" class="px-6 py-2 bg-[#00193c] text-white font-bold rounded-xl text-sm hover:opacity-90">Salvar</button>
      </div>
    </section>` : '';

  const histHTML = historico.length
    ? historico.map(h=>`<div class="bg-slate-50 p-4 rounded-xl border-l-4 border-[#00193c]">
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs font-black text-[#00193c] uppercase">${h.usuario_nome||'Sistema'}</span>
          <span class="text-xs text-slate-400">${API.formatarDataHora(h.criado_em)}</span>
        </div>
        <p class="text-sm text-slate-700">${h.texto}</p>
        ${h.tipo&&h.tipo!=='comentario'?`<span class="mt-1 inline-block text-xs px-2 py-0.5 rounded-full bg-slate-200 text-slate-600 font-bold">${h.tipo}</span>`:''}
      </div>`).join('')
    : '<p class="text-sm text-slate-400 text-center py-4">Nenhum comentário ainda.</p>';

  document.getElementById('main-content').innerHTML = `
    <div class="mb-6">
      <div class="flex flex-wrap items-center gap-2 mb-2">
        <span class="px-3 py-1 rounded-full text-xs font-bold" style="background:${cor}20;color:${cor}">${semLabel}</span>
        <span class="px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-600">${statusLabel}</span>
        ${proximo?`<span class="text-xs text-slate-400">→ próximo: ${proximo}</span>`:''}
      </div>
      <h1 class="text-3xl font-black text-[#00193c]">${projeto.osc_nome}</h1>
      <p class="text-slate-400 mt-1">${projeto.tipo_demanda} · Recebido: ${API.formatarData(projeto.data_recebimento)}</p>
    </div>
    <div class="grid grid-cols-12 gap-6">
      <div class="col-span-12 lg:col-span-8 space-y-6">
        <!-- Info -->
        <section class="bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
          <h2 class="font-bold text-[#00193c] mb-4">Informações Gerais</h2>
          <div class="grid grid-cols-3 gap-4">
            <div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Analista</p><p class="text-sm font-semibold">${projeto.analista_nome||'—'}</p></div>
            <div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Gestor</p><p class="text-sm font-semibold">${projeto.gestor_nome||'—'}</p></div>
            <div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Prazo</p><p class="text-sm font-semibold">${projeto.prazo_dias||7} dias úteis</p></div>
            <div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Distribuição</p><p class="text-sm font-semibold">${API.formatarData(projeto.data_distribuicao)}</p></div>
            <div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Data Prevista</p><p class="text-sm font-semibold">${API.formatarData(projeto.data_prevista)}</p></div>
            <div><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Saída Diretoria</p><p class="text-sm font-semibold">${API.formatarData(projeto.data_saida_diretoria)}</p></div>
            ${projeto.principais_apontamentos?`<div class="col-span-3"><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Apontamentos</p><p class="text-sm">${projeto.principais_apontamentos}</p></div>`:''}
            ${projeto.observacoes_gerencia?`<div class="col-span-3"><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Obs. Gerência</p><p class="text-sm">${projeto.observacoes_gerencia}</p></div>`:''}
          </div>
        </section>
        ${editFields}
        <!-- Comentário -->
        <section class="bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
          <h2 class="font-bold text-[#00193c] mb-4 flex items-center gap-2"><span class="material-symbols-outlined">add_comment</span>Novo Comentário</h2>
          <textarea id="novo-comentario" rows="4" placeholder="Observações ou atualizações..." class="w-full bg-slate-50 rounded-xl border-none p-4 text-sm"></textarea>
          <div class="flex justify-end mt-3">
            <button onclick="enviarComentario()" class="px-8 py-2.5 bg-[#00193c] text-white font-bold rounded-xl text-sm hover:opacity-90">Enviar</button>
          </div>
        </section>
      </div>
      <!-- Sidebar direita -->
      <div class="col-span-12 lg:col-span-4 space-y-6">
        <!-- Semáforo -->
        <section class="bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
          <h3 class="text-xs font-black text-[#00193c] uppercase tracking-widest mb-4">Situação do Prazo</h3>
          <div class="flex items-center gap-4">
            <div class="w-16 h-16 rounded-full flex items-center justify-center font-black text-2xl text-white flex-shrink-0" style="background:${cor}">
              ${projeto.semaforo?.dias!==null&&projeto.semaforo?.dias!==undefined?Math.abs(projeto.semaforo.dias):'—'}
            </div>
            <div>
              <p class="font-bold text-[#00193c] text-sm">${semLabel}</p>
              <p class="text-xs text-slate-400 mt-1">${projeto.semaforo?.cor==='VERDE'?'Dentro do prazo':projeto.semaforo?.cor==='AMARELO'?'Atenção':projeto.semaforo?.cor==='VERMELHO'?'Crítico':projeto.semaforo?.cor==='VENCIDO'?'Vencido':'Aguardando'}</p>
            </div>
          </div>
        </section>
        <!-- Histórico -->
        <section class="bg-white rounded-xl border border-slate-100 p-6 shadow-sm">
          <h3 class="text-xs font-black text-[#00193c] uppercase tracking-widest mb-4">Histórico de Atendimento</h3>
          <div id="hist-container" class="space-y-3">${histHTML}</div>
        </section>
      </div>
    </div>`;
}

async function tramitar() {
  const fluxo = {EM_ANALISE:'GFCAP',GFCAP:'OSC',OSC:'FINALIZADO'};
  const prox = fluxo[projeto.status];
  if (!prox || !confirm(`Tramitar para "${prox}"?`)) return;
  try {
    await API.tramitarProjeto(pid);
    await carregar();
  } catch(e) { alert(e.message); }
}

async function salvar() {
  try {
    await API.atualizarProjeto(pid, {
      data_distribuicao: document.getElementById('ed-distrib').value||null,
      data_saida_diretoria: document.getElementById('ed-saida').value||null,
      data_pausa: document.getElementById('ed-pausa').value||null,
      motivo_pausa: document.getElementById('ed-motivo').value||null,
      principais_apontamentos: document.getElementById('ed-aponts').value||null,
      observacoes_gerencia: document.getElementById('ed-obs').value||null,
    });
    const msg = document.getElementById('msg-salvo');
    msg.classList.remove('hidden');
    setTimeout(()=>msg.classList.add('hidden'),3000);
    await carregar();
  } catch(e) { alert(e.message); }
}

async function enviarComentario() {
  const txt = document.getElementById('novo-comentario')?.value?.trim();
  if (!txt) return;
  try {
    await API.adicionarComentario(pid, txt);
    document.getElementById('novo-comentario').value='';
    await carregar();
  } catch(e) { alert(e.message); }
}

init();
</script>
</body></html>
