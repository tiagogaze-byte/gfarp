<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — Gestão de Demandas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
body{font-family:'Inter',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;}
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<aside id="sidebar" class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col py-6 px-4 z-50 border-r border-slate-100"></aside>
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-white/90 backdrop-blur-md z-40 border-b border-slate-100 flex items-center justify-between px-8">
  <h1 class="text-lg font-black text-[#00193c]">Dashboard Central</h1>
  <div class="flex gap-2">
    <button onclick="API.exportarCSV()" class="px-4 py-2 bg-slate-100 rounded-lg text-sm font-bold text-slate-700 hover:bg-slate-200">Exportar CSV</button>
    <button onclick="init()" class="px-4 py-2 bg-[#00193c] text-white rounded-lg text-sm font-bold hover:opacity-90">Atualizar</button>
  </div>
</header>
<main class="ml-64 pt-24 pb-12 px-8 min-h-screen">
  <!-- KPIs -->
  <div class="grid grid-cols-3 gap-6 mb-8">
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total de Projetos</p>
      <h3 class="text-4xl font-black text-[#00193c]" id="val-total">--</h3>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Em Análise</p>
      <h3 class="text-4xl font-black text-emerald-600" id="val-open">--</h3>
    </div>
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 border-l-4 border-l-red-400">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Atrasados</p>
      <h3 class="text-4xl font-black text-red-600" id="val-delayed">--</h3>
    </div>
  </div>
  <!-- Tabela -->
  <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-6 flex justify-between items-center border-b border-slate-50">
      <h2 class="font-bold text-[#00193c]">Demandas Ativas</h2>
      <a href="/projetos.html" class="text-sm font-bold text-[#00193c] hover:underline">Ver todas →</a>
    </div>
    <table class="w-full text-left">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Código</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">OSC / Demanda</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Status</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Prazo</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400"></th>
        </tr>
      </thead>
      <tbody id="tbody" class="divide-y divide-slate-50">
        <tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">Carregando...</td></tr>
      </tbody>
    </table>
    <div class="px-6 py-3 border-t border-slate-50 text-xs text-slate-400" id="count-text"></div>
  </div>
</main>

<!-- Modal Novo Projeto -->
<div id="modal-projeto" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
  <div class="bg-white rounded-xl p-8 w-full max-w-lg shadow-xl">
    <h2 class="text-xl font-bold text-[#00193c] mb-6">Novo Projeto</h2>
    <form id="form-projeto" class="space-y-4">
      <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Tipo de Demanda</label>
        <select name="tipo_demanda" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm focus:ring-2 focus:ring-[#00193c]/20">
          <option value="">— Selecione —</option>
          <option>PLANO DE TRABALHO</option>
          <option>PRESTAÇÃO DE CONTAS</option>
          <option>RELATÓRIO PARCIAL</option>
          <option>ADITIVO</option>
        </select>
      </div>
      <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Nome da OSC / Instituição</label>
        <input name="osc_nome" type="text" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm focus:ring-2 focus:ring-[#00193c]/20" placeholder="Nome completo da organização"/>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Data de Recebimento</label>
          <input name="data_recebimento" type="date" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm focus:ring-2 focus:ring-[#00193c]/20"/>
        </div>
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Prazo (dias úteis)</label>
          <input name="prazo_dias" type="number" value="7" min="1" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm focus:ring-2 focus:ring-[#00193c]/20"/>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Gestor</label>
          <select id="mp-opts-gestor" name="gestor_id" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm focus:ring-2 focus:ring-[#00193c]/20"></select>
        </div>
        <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Analista</label>
          <select id="mp-opts-analista" name="analista_id" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm focus:ring-2 focus:ring-[#00193c]/20"></select>
        </div>
      </div>
      <p id="mp-erro" class="text-red-500 text-sm"></p>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="fecharModalNovoProjeto()" class="flex-1 py-3 rounded-xl border border-slate-200 text-sm font-bold">Cancelar</button>
        <button type="submit" class="flex-1 py-3 rounded-xl bg-[#00193c] text-white text-sm font-bold hover:opacity-90">Registrar Projeto</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
async function init() {
  const u = await protegerRota();
  if (!u) return;
  montarSidebar(u, 'dash');

  // Botão Novo Projeto na sidebar
  const btnNovo = document.createElement('button');
  btnNovo.className = 'w-full mt-4 bg-[#00193c] text-white py-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2 hover:opacity-90';
  btnNovo.innerHTML = '<span class="material-symbols-outlined text-sm">add</span>Novo Projeto';
  btnNovo.onclick = abrirModalNovoProjeto;
  document.getElementById('sidebar').querySelector('nav').after(btnNovo);

  try {
    const [rel, proj] = await Promise.all([API.relatorio(), API.listarProjetos()]);
    const t = rel.totais;
    document.getElementById('val-total').textContent = t.total;
    document.getElementById('val-open').textContent = t.em_analise;
    document.getElementById('val-delayed').textContent = t.atrasados;
    renderTabela(proj.slice(0,8));
    document.getElementById('count-text').textContent = `Exibindo ${Math.min(8,proj.length)} de ${proj.length} projetos`;
  } catch(e) { console.error(e); }
}

function renderTabela(lista) {
  const tbody = document.getElementById('tbody');
  if (!lista.length) { tbody.innerHTML='<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">Nenhuma demanda encontrada.</td></tr>'; return; }
  tbody.innerHTML = lista.map(p => {
    const cor = API.semaforoCor(p.semaforo);
    const label = API.semaforoLabel(p.semaforo);
    const sl = API.statusLabel(p.status);
    return `<tr class="hover:bg-slate-50 cursor-pointer" onclick="window.location='/projeto-detalhe.html?id=${p.id}'">
      <td class="px-6 py-4 font-mono text-xs text-slate-400">${p.codigo}</td>
      <td class="px-6 py-4"><p class="font-bold text-sm text-[#00193c]">${p.osc_nome}</p><p class="text-xs text-slate-400">${p.tipo_demanda}</p></td>
      <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-600">${sl}</span></td>
      <td class="px-6 py-4"><span class="text-xs font-bold px-2 py-1 rounded-full" style="background:${cor}20;color:${cor}">${label}</span></td>
      <td class="px-6 py-4 text-right"><span class="material-symbols-outlined text-slate-400">arrow_forward</span></td>
    </tr>`;
  }).join('');
}

document.getElementById('form-projeto').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const dados = Object.fromEntries(fd.entries());
  try {
    await API.criarProjeto(dados);
    fecharModalNovoProjeto();
    init();
  } catch(err) { document.getElementById('mp-erro').textContent = err.message; }
});

init();
</script>
</body></html>
