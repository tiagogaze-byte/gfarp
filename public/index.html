<!DOCTYPE html><html lang="pt-br"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — GFARP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>body{font-family:'Inter',sans-serif;}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;}</style>
</head><body class="bg-slate-100 text-slate-800">
<aside id="sidebar" class="h-screen w-60 fixed left-0 top-0 bg-slate-50 flex flex-col py-5 px-3 z-50 border-r border-slate-200"></aside>
<header class="fixed top-0 right-0 w-[calc(100%-15rem)] h-14 bg-white z-40 border-b border-slate-200 flex items-center justify-between px-6">
  <h1 class="font-black text-[#00193c]">Dashboard</h1>
  <div id="hdr-btns" class="flex gap-2"></div>
</header>
<main class="ml-60 pt-20 pb-10 px-6 min-h-screen">
  <div id="cards" class="grid gap-3 mb-6"></div>
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="px-5 py-4 flex justify-between items-center border-b border-slate-100">
      <h2 class="font-bold text-[#00193c] text-sm">Demandas Ativas</h2>
      <a href="/projetos.html" class="text-xs font-bold text-[#00193c] hover:underline">Ver todas →</a>
    </div>
    <table class="w-full text-left">
      <thead class="bg-slate-50 border-b border-slate-100"><tr>
        <th class="px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Código</th>
        <th class="px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-slate-400">OSC / Tipo</th>
        <th class="px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Status</th>
        <th class="px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-slate-400">Prazo</th>
        <th class="px-5 py-2.5"></th>
      </tr></thead>
      <tbody id="tbody" class="divide-y divide-slate-50"><tr><td colspan="5" class="px-5 py-10 text-center text-slate-400 text-sm">Carregando...</td></tr></tbody>
    </table>
    <div class="px-5 py-2.5 border-t border-slate-100 text-xs text-slate-400" id="count"></div>
  </div>
</main>

<!-- Modal Novo Projeto -->
<div id="modal-projeto" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl p-6 w-full max-w-lg shadow-xl">
    <h2 class="text-lg font-bold text-[#00193c] mb-5">Novo Projeto</h2>
    <form id="form-projeto" class="space-y-3">
      <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tipo de Demanda</label>
        <select name="tipo_demanda" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm">
          <option value="">— Selecione —</option>
          <option>PLANO DE TRABALHO</option><option>PRESTAÇÃO DE CONTAS</option>
          <option>RELATÓRIO PARCIAL</option><option>ADITIVO</option><option>APOSTILAMENTO</option>
        </select></div>
      <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Nome da OSC</label>
        <input name="osc_nome" type="text" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Data Recebimento</label>
          <input name="data_recebimento" type="date" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Prazo (dias úteis)</label>
          <input name="prazo_dias" type="number" value="7" min="1" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"/></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Gestor</label>
          <select id="mp-gestor" name="gestor_id" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"></select></div>
        <div><label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Analista</label>
          <select id="mp-analista" name="analista_id" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2 text-sm"></select></div>
      </div>
      <p id="mp-erro" class="text-red-500 text-xs"></p>
      <div class="flex gap-3 pt-1">
        <button type="button" onclick="fecharModalNovoProjeto()" class="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-bold">Cancelar</button>
        <button type="submit" class="flex-1 py-2.5 rounded-xl bg-[#00193c] text-white text-sm font-bold hover:opacity-90">Registrar</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let _u;
async function init(){
  _u=await protegerRota(); if(!_u)return;
  montarSidebar(_u,'dash');
  const master=getPapel(_u)==='MASTER';

  // Botões no header — apenas master
  if(master){
    document.getElementById('hdr-btns').innerHTML=`
      <button onclick="API.exportarCSV()" class="px-3 py-1.5 bg-slate-100 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-200">Exportar CSV</button>
      <button onclick="init()" class="px-3 py-1.5 bg-[#00193c] text-white rounded-lg text-xs font-bold hover:opacity-90">Atualizar</button>`;
  } else {
    document.getElementById('hdr-btns').innerHTML=`<button onclick="init()" class="px-3 py-1.5 bg-[#00193c] text-white rounded-lg text-xs font-bold hover:opacity-90">Atualizar</button>`;
  }

  try{
    const [rel,proj]=await Promise.all([API.relatorio().catch(()=>({totais:{total:0,em_analise:0,gfcap:0,osc:0,finalizado:0,atrasados:0}})), API.listarProjetos()]);
    const t=rel.totais;

    if(master){
      // 6 cards para master
      document.getElementById('cards').className='grid grid-cols-3 md:grid-cols-6 gap-3 mb-6';
      document.getElementById('cards').innerHTML=`
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total</p><h3 class="text-3xl font-black text-[#00193c]">${t.total}</h3></div>
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Em Análise</p><h3 class="text-3xl font-black text-emerald-600">${t.em_analise}</h3></div>
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">GFCAP</p><h3 class="text-3xl font-black text-blue-600">${t.gfcap}</h3></div>
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">OSC</p><h3 class="text-3xl font-black text-purple-600">${t.osc}</h3></div>
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Finalizados</p><h3 class="text-3xl font-black text-slate-400">${t.finalizado}</h3></div>
        <div class="bg-white p-4 rounded-xl border-l-4 border-l-red-500 border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Atrasados</p><h3 class="text-3xl font-black text-red-600">${t.atrasados}</h3></div>`;
    } else {
      // Cards simples para padrão
      document.getElementById('cards').className='grid grid-cols-2 gap-3 mb-6';
      document.getElementById('cards').innerHTML=`
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Meus Projetos</p><h3 class="text-3xl font-black text-[#00193c]">${proj.length}</h3></div>
        <div class="bg-white p-4 rounded-xl border-l-4 border-l-red-500 border border-slate-200 shadow-sm"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Atrasados</p><h3 class="text-3xl font-black text-red-600">${proj.filter(p=>p.semaforo?.cor==='VENCIDO').length}</h3></div>`;
    }

    const tbody=document.getElementById('tbody');
    const lista=proj.slice(0,10);
    if(!lista.length){tbody.innerHTML='<tr><td colspan="5" class="px-5 py-10 text-center text-slate-400 text-sm">Nenhuma demanda.</td></tr>';return;}
    tbody.innerHTML=lista.map(p=>{
      const cor=API.semaforoCor(p.semaforo);
      return `<tr class="hover:bg-slate-50 cursor-pointer" onclick="window.location='/projeto-detalhe.html?id=${p.id}'">
        <td class="px-5 py-3 font-mono text-xs text-slate-400">${p.codigo}</td>
        <td class="px-5 py-3"><p class="font-bold text-sm text-[#00193c]">${p.osc_nome}</p><p class="text-xs text-slate-400">${p.tipo_demanda}</p></td>
        <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-bold bg-slate-100 text-slate-600">${API.statusLabel(p.status)}</span></td>
        <td class="px-5 py-3"><span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:${cor}15;color:${cor}">${API.semaforoLabel(p.semaforo)}</span></td>
        <td class="px-5 py-3 text-right"><span class="material-symbols-outlined text-slate-300 text-sm">arrow_forward</span></td>
      </tr>`;
    }).join('');
    document.getElementById('count').textContent=`${lista.length} de ${proj.length} projetos`;
  }catch(e){console.error(e);}
}
document.getElementById('form-projeto').addEventListener('submit',async e=>{
  e.preventDefault();
  const d=Object.fromEntries(new FormData(e.target).entries());
  try{await API.criarProjeto(d);fecharModalNovoProjeto();init();}
  catch(err){document.getElementById('mp-erro').textContent=err.message;}
});
init();
</script>
</body></html>
