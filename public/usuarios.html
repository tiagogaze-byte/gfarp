<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Usuários — Gestão de Demandas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>body{font-family:'Inter',sans-serif;}.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;}</style>
</head>
<body class="bg-slate-50 text-slate-800">
<aside id="sidebar" class="h-screen w-64 fixed left-0 top-0 bg-slate-50 flex flex-col py-6 px-4 z-50 border-r border-slate-100"></aside>
<header class="fixed top-0 right-0 w-[calc(100%-16rem)] h-16 bg-white/90 backdrop-blur-md z-40 border-b border-slate-100 flex items-center justify-between px-8">
  <h1 class="text-lg font-black text-[#00193c]">Usuários</h1>
  <button onclick="abrirModal()" class="px-4 py-2 bg-[#00193c] text-white rounded-lg text-sm font-bold flex items-center gap-2 hover:opacity-90">
    <span class="material-symbols-outlined text-sm">person_add</span>Novo Usuário
  </button>
</header>
<main class="ml-64 pt-24 pb-12 px-8 min-h-screen">
  <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Nome</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Email</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400">Perfil</th>
          <th class="px-6 py-3 text-xs font-black uppercase tracking-widest text-slate-400 text-center">Proj. Ativos</th>
          <th class="px-6 py-3"></th>
        </tr>
      </thead>
      <tbody id="tbody" class="divide-y divide-slate-50">
        <tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center">
  <div class="bg-white rounded-xl p-8 w-full max-w-md shadow-xl">
    <h2 class="text-xl font-bold text-[#00193c] mb-6">Novo Usuário</h2>
    <form id="form-usuario" class="space-y-4">
      <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Nome completo</label>
        <input name="nome" type="text" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm"/></div>
      <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Email</label>
        <input name="email" type="email" required class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm"/></div>
      <div><label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Senha inicial</label>
        <input name="senha" type="password" required minlength="6" class="w-full bg-slate-50 rounded-lg border-none px-3 py-2.5 text-sm"/></div>
      <div class="flex items-center gap-3">
        <input name="is_master" type="checkbox" id="is_master" class="rounded"/>
        <label for="is_master" class="text-sm text-slate-500">Administrador (acesso total)</label>
      </div>
      <p id="erro" class="text-red-500 text-sm"></p>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="fecharModal()" class="flex-1 py-3 rounded-xl border border-slate-200 text-sm font-bold">Cancelar</button>
        <button type="submit" class="flex-1 py-3 rounded-xl bg-[#00193c] text-white text-sm font-bold hover:opacity-90">Criar</button>
      </div>
    </form>
  </div>
</div>

<script src="/public/js/api.js"></script>
<script>
async function init() {
  const u = await protegerRota();
  if (!u) return;
  if (!u.is_master) { window.location.href='/index.html'; return; }
  montarSidebar(u, 'user');
  await carregar();
}

async function carregar() {
  const tbody = document.getElementById('tbody');
  try {
    const lista = await API.listarUsuarios();
    if (!lista.length) { tbody.innerHTML='<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">Nenhum usuário.</td></tr>'; return; }
    tbody.innerHTML = lista.map(u=>`<tr class="hover:bg-slate-50">
      <td class="px-6 py-4 font-semibold text-sm text-[#00193c]">${u.nome}</td>
      <td class="px-6 py-4 text-sm text-slate-400">${u.email}</td>
      <td class="px-6 py-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${u.is_master?'bg-[#00193c] text-white':'bg-slate-100 text-slate-600'}">${u.is_master?'MASTER':'PADRÃO'}</span></td>
      <td class="px-6 py-4 text-center text-sm">
        <span title="Analista">📋 ${u.projetos_ativos_analista||0}</span> &nbsp;
        <span title="Gestor">👤 ${u.projetos_ativos_gestor||0}</span>
      </td>
      <td class="px-6 py-4 text-right">
        <button onclick="desativar(${u.id},'${u.nome}')" class="text-xs font-bold text-red-500 hover:underline">Desativar</button>
      </td>
    </tr>`).join('');
  } catch(e) { tbody.innerHTML=`<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">${e.message}</td></tr>`; }
}

function abrirModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('erro').textContent=''; document.getElementById('form-usuario').reset(); }
function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

document.getElementById('form-usuario').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    await API.criarUsuario({ nome:fd.get('nome'), email:fd.get('email'), senha:fd.get('senha'), is_master:!!fd.get('is_master') });
    fecharModal();
    carregar();
  } catch(err) { document.getElementById('erro').textContent=err.message; }
});

async function desativar(id, nome) {
  if (!confirm(`Desativar "${nome}"?`)) return;
  try { await API.desativarUsuario(id); carregar(); } catch(e) { alert(e.message); }
}

init();
</script>
</body></html>
